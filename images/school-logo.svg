<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060818"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bgGrad)"/>

  <!-- Glow effect -->
  <circle cx="50" cy="55" r="38" fill="rgba(99,102,241,0.12)"/>

  <!-- School building body -->
  <rect x="18" y="45" width="64" height="38" rx="2" fill="url(#wallGrad)"/>

  <!-- Roof / Triangle -->
  <polygon points="50,14 14,46 86,46" fill="url(#roofGrad)"/>

  <!-- Roof outline glow -->
  <polygon points="50,14 14,46 86,46" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.5"/>

  <!-- Left window -->
  <rect x="24" y="53" width="14" height="11" rx="2" fill="#22d3ee" opacity="0.85"/>
  <line x1="31" y1="53" x2="31" y2="64" stroke="#0e7490" stroke-width="1"/>
  <line x1="24" y1="58.5" x2="38" y2="58.5" stroke="#0e7490" stroke-width="1"/>

  <!-- Right window -->
  <rect x="62" y="53" width="14" height="11" rx="2" fill="#22d3ee" opacity="0.85"/>
  <line x1="69" y1="53" x2="69" y2="64" stroke="#0e7490" stroke-width="1"/>
  <line x1="62" y1="58.5" x2="76" y2="58.5" stroke="#0e7490" stroke-width="1"/>

  <!-- Door -->
  <rect x="43" y="62" width="14" height="21" rx="2" fill="#1e1b4b"/>
  <rect x="43" y="62" width="14" height="21" rx="2" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Door knob -->
  <circle cx="54" cy="73" r="1.5" fill="#f59e0b"/>

  <!-- Flag pole -->
  <line x1="50" y1="14" x2="50" y2="5" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Flag -->
  <polygon points="50,5 62,8.5 50,12" fill="#f59e0b"/>

  <!-- Ground line -->
  <rect x="12" y="83" width="76" height="2" rx="1" fill="#6366f1" opacity="0.4"/>

  <!-- Steps -->
  <rect x="40" y="81" width="20" height="3" rx="1" fill="#4f46e5" opacity="0.7"/>
  <rect x="43" y="79" width="14" height="3" rx="1" fill="#4f46e5" opacity="0.5"/>

  <!-- SHS text -->
  <text x="50" y="95" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#818cf8" text-anchor="middle" letter-spacing="2">SHS</text>
</svg>
