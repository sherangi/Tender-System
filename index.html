<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Login Option</title>
    <link rel="icon" href="images/school-logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0b071e;
            background-image:
                radial-gradient(ellipse at bottom, rgba(162, 28, 175, 0.4) 0%, rgba(15, 23, 42, 0) 60%),
                radial-gradient(ellipse at bottom left, rgba(37, 99, 235, 0.5) 0%, rgba(15, 23, 42, 0) 50%);
            position: relative;
            overflow: hidden;
            color: #fff;
        }

        /* Starry background effect */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.5;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 45px 40px;
            background: rgba(20, 15, 45, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.15),
                inset 0 0 20px rgba(139, 92, 246, 0.1);
            text-align: center;
            z-index: 10;
            position: relative;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.6), rgba(168, 85, 247, 0.6), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 400;
            color: #d1d5db;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            padding: 18px 24px;
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.4), rgba(76, 29, 149, 0.4));
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: left 0.5s ease;
        }

        .option-btn:hover::before {
            left: 100%;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(90deg, rgba(30, 58, 138, 0.6), rgba(76, 29, 149, 0.6));
            border-color: rgba(167, 139, 250, 0.8);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            color: #fff;
        }

        .option-btn:active {
            transform: translateY(1px);
        }

        .btn-icon {
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .icon-blue {
            color: #60a5fa;
            filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.6));
        }

        .icon-purple {
            color: #c084fc;
            filter: drop-shadow(0 0 8px rgba(192, 132, 252, 0.6));
        }

        .option-btn:last-child {
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Please select an option:</h2>

        <a href="admin_login.html" class="option-btn">
            <span class="btn-icon icon-blue">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </span>
            Log in as Authorized User
        </a>

        <a href="bidder_login.html" class="option-btn">
            <span class="btn-icon icon-purple">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </span>
            Log in as Bidder
        </a>
    </div>
</body>

</html>
