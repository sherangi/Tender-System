<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Springfield High School</title>
    <link rel="icon" href="images/school-logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="dt-body">
    <div class="dt-login-box">
        <div class="dt-login-header">
            <h1>
                <span class="dt-header-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                    </svg>
                </span>
                Springfield High School
            </h1>
            <p>Register as a new bidder</p>
        </div>
        
        <div class="dt-header-separator"></div>

        <form id="registerForm" onsubmit="handleBidderRegister(event)" autocomplete="off">
            <div class="dt-form-group">
                <div class="dt-label-row">
                    <div>
                        <svg class="dt-label-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <label for="username">Username</label>
                    </div>
                </div>
                <div class="dt-input-wrapper">
                    <span class="dt-input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input type="text" id="username" class="dt-form-control" placeholder="Username" autocomplete="off" required style="padding-left: 42px; letter-spacing: 0.3px;">
                </div>
            </div>

            <div class="dt-form-group">
                <div class="dt-label-row">
                    <div>
                        <svg class="dt-label-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                        <label for="email">Email Address</label>
                    </div>
                </div>
                <div class="dt-input-wrapper">
                    <span class="dt-input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </span>
                    <input type="email" id="email" class="dt-form-control" placeholder="Email address" autocomplete="off" required>
                </div>
            </div>

            <div class="dt-form-group">
                <div class="dt-label-row">
                    <div>
                        <svg class="dt-label-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <label for="password">Password</label>
                    </div>
                </div>
                <div class="dt-input-wrapper">
                    <span class="dt-input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="password" class="dt-form-control" placeholder="Password" autocomplete="new-password" required>
                </div>
            </div>

            <div class="dt-form-group">
                <div class="dt-label-row">
                    <div>
                        <svg class="dt-label-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                        <label for="confirmPassword">Confirm Password</label>
                    </div>
                </div>
                <div class="dt-input-wrapper">
                    <span class="dt-input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                    </span>
                    <input type="password" id="confirmPassword" class="dt-form-control" placeholder="Confirm Password" autocomplete="new-password" required>
                </div>
            </div>

            <button type="submit" class="dt-submit-btn">Register</button>
            
            <div style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: #b3c0d1;">
                Already have an account? <a href="bidder_login.html" style="color:#7dd3fc; text-decoration:none;">Login here</a>
            </div>
        </form>
    </div>
    
    <div id="errorToast" class="dt-toast dt-toast-error" style="display: none;">Passwords do not match.</div>
    <div id="successToast" class="dt-toast dt-toast-success" style="display: none;">Registration successful! Redirecting to login...</div>

    <script src="main.js"></script>
</body>
</html>
