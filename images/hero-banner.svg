<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" width="1400" height="320">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060818"/>
      <stop offset="50%"  stop-color="#0d1033"/>
      <stop offset="100%" stop-color="#0f1a4a"/>
    </linearGradient>
    <linearGradient id="build1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e2460"/>
      <stop offset="100%" stop-color="#0a0d20"/>
    </linearGradient>
    <linearGradient id="build2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#16204a"/>
      <stop offset="100%" stop-color="#07091a"/>
    </linearGradient>
    <linearGradient id="glow-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky background -->
  <rect width="1400" height="320" fill="url(#sky)"/>

  <!-- subtle grid -->
  <g opacity="0.07" stroke="#6366f1" stroke-width="0.5">
    <!-- vertical -->
    <line x1="0"    y1="0" x2="0"    y2="320"/>
    <line x1="100"  y1="0" x2="100"  y2="320"/>
    <line x1="200"  y1="0" x2="200"  y2="320"/>
    <line x1="300"  y1="0" x2="300"  y2="320"/>
    <line x1="400"  y1="0" x2="400"  y2="320"/>
    <line x1="500"  y1="0" x2="500"  y2="320"/>
    <line x1="600"  y1="0" x2="600"  y2="320"/>
    <line x1="700"  y1="0" x2="700"  y2="320"/>
    <line x1="800"  y1="0" x2="800"  y2="320"/>
    <line x1="900"  y1="0" x2="900"  y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
    <line x1="1100" y1="0" x2="1100" y2="320"/>
    <line x1="1200" y1="0" x2="1200" y2="320"/>
    <line x1="1300" y1="0" x2="1300" y2="320"/>
    <line x1="1400" y1="0" x2="1400" y2="320"/>
    <!-- horizontal -->
    <line x1="0" y1="80"  x2="1400" y2="80"/>
    <line x1="0" y1="160" x2="1400" y2="160"/>
    <line x1="0" y1="240" x2="1400" y2="240"/>
  </g>

  <!-- glow orbs -->
  <ellipse cx="200"  cy="280" rx="180" ry="80" fill="#6366f1" opacity="0.10" filter="url(#blur8)"/>
  <ellipse cx="700"  cy="300" rx="220" ry="60" fill="#22d3ee" opacity="0.08" filter="url(#blur8)"/>
  <ellipse cx="1200" cy="280" rx="180" ry="80" fill="#8b5cf6" opacity="0.10" filter="url(#blur8)"/>

  <!-- buildings — back layer -->
  <rect x="0"   y="180" width="90"  height="140" fill="url(#build2)" opacity="0.6"/>
  <rect x="100" y="140" width="70"  height="180" fill="url(#build2)" opacity="0.5"/>
  <rect x="180" y="160" width="50"  height="160" fill="url(#build2)" opacity="0.5"/>
  <rect x="1140" y="150" width="80" height="170" fill="url(#build2)" opacity="0.5"/>
  <rect x="1240" y="170" width="60" height="150" fill="url(#build2)" opacity="0.5"/>
  <rect x="1310" y="140" width="90" height="180" fill="url(#build2)" opacity="0.6"/>

  <!-- buildings — main layer (more complex) -->
  <!-- Left cluster -->
  <rect x="30"  y="120" width="60"  height="200" fill="url(#build1)"/>
  <rect x="50"  y="100" width="20"  height="20"  fill="#22d3ee" opacity="0.5"/>
  <rect x="120" y="90"  width="80"  height="230" fill="url(#build1)"/>
  <rect x="130" y="70"  width="10"  height="20"  fill="#6366f1" opacity="0.9"/>
  <!-- Windows left -->
  <g fill="#22d3ee" opacity="0.4">
    <rect x="125" y="105" width="8" height="8"/><rect x="140" y="105" width="8" height="8"/>
    <rect x="155" y="105" width="8" height="8"/><rect x="170" y="105" width="8" height="8"/>
    <rect x="125" y="122" width="8" height="8"/><rect x="140" y="122" width="8" height="8"/>
    <rect x="155" y="122" width="8" height="8"/><rect x="170" y="122" width="8" height="8"/>
    <rect x="125" y="139" width="8" height="8"/><rect x="140" y="139" width="8" height="8"/>
    <rect x="155" y="139" width="8" height="8"/><rect x="170" y="139" width="8" height="8"/>
  </g>

  <!-- Center tall tower -->
  <rect x="580" y="30"  width="120" height="290" fill="url(#build1)"/>
  <rect x="610" y="10"  width="20"  height="20"  fill="#ec4899" opacity="0.9"/>
  <rect x="620" y="0"   width="4"   height="10"  fill="#ec4899"/>
  <!-- center building windows -->
  <g fill="#6366f1" opacity="0.5">
    <rect x="590" y="50"  width="10" height="10"/><rect x="608" y="50"  width="10" height="10"/>
    <rect x="626" y="50"  width="10" height="10"/><rect x="644" y="50"  width="10" height="10"/>
    <rect x="662" y="50"  width="10" height="10"/>
    <rect x="590" y="70"  width="10" height="10"/><rect x="608" y="70"  width="10" height="10"/>
    <rect x="626" y="70"  width="10" height="10"/><rect x="644" y="70"  width="10" height="10"/>
    <rect x="662" y="70"  width="10" height="10"/>
    <rect x="590" y="90"  width="10" height="10"/><rect x="608" y="90"  width="10" height="10"/>
    <rect x="626" y="90"  width="10" height="10"/><rect x="644" y="90"  width="10" height="10"/>
    <rect x="662" y="90"  width="10" height="10"/>
    <rect x="590" y="110" width="10" height="10"/><rect x="608" y="110" width="10" height="10"/>
    <rect x="626" y="110" width="10" height="10"/><rect x="644" y="110" width="10" height="10"/>
    <rect x="662" y="110" width="10" height="10"/>
  </g>

  <!-- Right cluster -->
  <rect x="1150" y="100" width="80"  height="220" fill="url(#build1)"/>
  <rect x="1160" y="80"  width="10"  height="20"  fill="#6366f1" opacity="0.9"/>
  <rect x="1250" y="120" width="100" height="200" fill="url(#build1)"/>
  <!-- right windows -->
  <g fill="#22d3ee" opacity="0.4">
    <rect x="1260" y="135" width="8" height="8"/><rect x="1275" y="135" width="8" height="8"/>
    <rect x="1290" y="135" width="8" height="8"/><rect x="1305" y="135" width="8" height="8"/>
    <rect x="1260" y="152" width="8" height="8"/><rect x="1275" y="152" width="8" height="8"/>
    <rect x="1290" y="152" width="8" height="8"/><rect x="1305" y="152" width="8" height="8"/>
    <rect x="1260" y="169" width="8" height="8"/><rect x="1275" y="169" width="8" height="8"/>
    <rect x="1290" y="169" width="8" height="8"/><rect x="1305" y="169" width="8" height="8"/>
  </g>

  <!-- Glowing horizon line -->
  <rect x="0" y="318" width="1400" height="3" fill="url(#glow-line)" opacity="0.9" filter="url(#blur4)"/>
  <rect x="0" y="316" width="1400" height="1" fill="#22d3ee" opacity="0.5"/>

  <!-- Floating particles (animated via CSS in HTML) -->
  <circle id="p1" cx="200"  cy="80"  r="2" fill="#6366f1" opacity="0.8">
    <animate attributeName="cy" values="80;40;80"   dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle id="p2" cx="400"  cy="60"  r="1.5" fill="#22d3ee" opacity="0.7">
    <animate attributeName="cy" values="60;20;60"   dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle id="p3" cx="700"  cy="20"  r="2.5" fill="#ec4899" opacity="0.8">
    <animate attributeName="cy" values="20;60;20"   dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle id="p4" cx="900"  cy="100" r="1.5" fill="#8b5cf6" opacity="0.7">
    <animate attributeName="cy" values="100;60;100" dur="6s"   repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle id="p5" cx="1100" cy="70"  r="2"   fill="#22d3ee" opacity="0.6">
    <animate attributeName="cy" values="70;30;70"   dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle id="p6" cx="1300" cy="50"  r="1.5" fill="#6366f1" opacity="0.8">
    <animate attributeName="cy" values="50;90;50"   dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Blockchain chain nodes overlay -->
  <g opacity="0.18" stroke="#22d3ee" stroke-width="1" fill="none">
    <line x1="100" y1="50"  x2="300" y2="80"/>
    <line x1="300" y1="80"  x2="500" y2="40"/>
    <line x1="500" y1="40"  x2="700" y2="60"/>
    <line x1="700" y1="60"  x2="900" y2="30"/>
    <line x1="900" y1="30"  x2="1100" y2="70"/>
    <line x1="1100" y1="70" x2="1300" y2="50"/>
    <circle cx="100"  cy="50"  r="5" fill="#22d3ee"/>
    <circle cx="300"  cy="80"  r="5" fill="#6366f1"/>
    <circle cx="500"  cy="40"  r="5" fill="#8b5cf6"/>
    <circle cx="700"  cy="60"  r="5" fill="#22d3ee"/>
    <circle cx="900"  cy="30"  r="5" fill="#ec4899"/>
    <circle cx="1100" cy="70"  r="5" fill="#6366f1"/>
    <circle cx="1300" cy="50"  r="5" fill="#22d3ee"/>
  </g>
</svg>
