<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#12102a"/>
      <stop offset="100%" stop-color="#060818"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="200" height="200" fill="url(#bg2)" rx="24"/>

  <!-- Connecting lines -->
  <g stroke="#6366f1" stroke-width="1" opacity="0.5">
    <line x1="100" y1="100" x2="50"  y2="50" ><animate attributeName="opacity" values="0.5;1;0.5" dur="2s"   repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="150" y2="50" ><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="160" y2="110"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s"   repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="150" y2="160"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="50"  y2="155"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="40"  y2="110"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></line>
    <!-- outer connections -->
    <line x1="50"  y1="50"  x2="150" y2="50" stroke="#22d3ee" opacity="0.2"/>
    <line x1="150" y1="50"  x2="160" y2="110" stroke="#22d3ee" opacity="0.2"/>
    <line x1="50"  y1="155" x2="150" y2="160" stroke="#22d3ee" opacity="0.2"/>
  </g>

  <!-- Nodes -->
  <!-- Centre hub -->
  <circle cx="100" cy="100" r="14" fill="#6366f1" filter="url(#glow2)">
    <animate attributeName="r" values="14;16;14" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="7" fill="white" opacity="0.9"/>

  <!-- Outer nodes -->
  <circle cx="50"  cy="50"  r="9" fill="#22d3ee" filter="url(#glow2)">
    <animate attributeName="r" values="9;11;9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50"  cy="50"  r="4.5" fill="white" opacity="0.85"/>

  <circle cx="150" cy="50"  r="9" fill="#8b5cf6" filter="url(#glow2)">
    <animate attributeName="r" values="9;11;9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="50"  r="4.5" fill="white" opacity="0.85"/>

  <circle cx="160" cy="110" r="9" fill="#ec4899" filter="url(#glow2)">
    <animate attributeName="r" values="9;11;9" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="110" r="4.5" fill="white" opacity="0.85"/>

  <circle cx="150" cy="160" r="9" fill="#22d3ee" filter="url(#glow2)">
    <animate attributeName="r" values="9;11;9" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="160" r="4.5" fill="white" opacity="0.85"/>

  <circle cx="50"  cy="155" r="9" fill="#f59e0b" filter="url(#glow2)">
    <animate attributeName="r" values="9;11;9" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50"  cy="155" r="4.5" fill="white" opacity="0.85"/>

  <circle cx="40"  cy="110" r="9" fill="#6366f1" filter="url(#glow2)">
    <animate attributeName="r" values="9;11;9" dur="3.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40"  cy="110" r="4.5" fill="white" opacity="0.85"/>

  <!-- Travelling data pulse on lines -->
  <circle r="3" fill="#fff" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite" path="M100,100 L50,50"/>
    <animate attributeName="opacity" values="0.9;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#22d3ee" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M100,100 L150,160"/>
    <animate attributeName="opacity" values="0.9;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#f59e0b" opacity="0.9">
    <animateMotion dur="3s" repeatCount="indefinite" path="M100,100 L160,110"/>
    <animate attributeName="opacity" values="0.9;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
